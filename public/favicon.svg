<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="GenAI Community EU">
  <defs>
    <linearGradient id="iris" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#cdeede"/>
      <stop offset="30%" stop-color="#e8e4f7"/>
      <stop offset="55%" stop-color="#fbe1ef"/>
      <stop offset="78%" stop-color="#fdf4d6"/>
      <stop offset="100%" stop-color="#d6ecf6"/>
    </linearGradient>
  </defs>
  <!-- dark tile with iris frame (echoes the logo's framed boxes) -->
  <rect x="3" y="3" width="94" height="94" rx="22" fill="#0a0a0b"/>
  <rect x="3" y="3" width="94" height="94" rx="22" fill="none" stroke="url(#iris)" stroke-width="2.5" opacity="0.55"/>
  <!-- chapters converging on the anchor (Valencia) -->
  <g stroke="#ffffff" stroke-width="1.6" opacity="0.32">
    <line x1="50" y1="52" x2="25" y2="29"/>
    <line x1="50" y1="52" x2="75" y2="23"/>
    <line x1="50" y1="52" x2="27" y2="78"/>
    <line x1="50" y1="52" x2="81" y2="61"/>
  </g>
  <g fill="#cdeede">
    <circle cx="25" cy="29" r="5"/>
    <circle cx="75" cy="23" r="5"/>
    <circle cx="27" cy="78" r="5"/>
    <circle cx="81" cy="61" r="5"/>
  </g>
  <!-- anchor node -->
  <circle cx="50" cy="52" r="16" fill="none" stroke="url(#iris)" stroke-width="1.8" opacity="0.45"/>
  <circle cx="50" cy="52" r="11" fill="url(#iris)"/>
</svg>
